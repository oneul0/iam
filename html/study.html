<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <title>스터디 - 김기훈의 갤럭시</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="phone-wrapper">
        <div class="hardware-btn volume-up"></div>
        <div class="hardware-btn volume-down"></div>
        <div class="hardware-btn power-btn"></div>

        <div class="phone-container">
            <div class="camera-island"></div>

            <div class="status-bar">
                <span class="status-time">15:00</span>
                <span class="status-icons">LTE 🔋 100%</span>
            </div>

            <div class="screen-content">
                <section
                    id="sec-study"
                    class="app-section active"
                >
                    <div class="card-panel">
                        <span class="study-badge">
                            모집 중
                        </span>

                        <h1 class="section-title">
                            ✍️ 취업 스터디 빌드업
                        </h1>

                        <p class="about-text">
                            자소서 첨삭, 모의 면접 등 취업 관련
                            스터디를 함께 시작하고 싶습니다.
                            구체적인 진행 방식은 여러분과 함께
                            맞춰나가며 채워갈 예정이니 편하게
                            다가와 주세요!
                        </p>
                    </div>
                </section>
            </div>

            <div
                id="navigation-container"
                class="navigation-container"
            ></div>
        </div>
    </div>

    <script src="../js/common.js"></script>
</body>
</html>
