<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>추천 - 김기훈의 갤럭시</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="../css/custom.css">
</head>
<body class="flex min-h-screen items-center justify-center bg-slate-900 p-5 font-sans text-slate-50">
    <div class="phone-wrapper relative px-3">
        <div class="hardware-btn volume-up absolute top-[140px] left-2 z-10 h-[50px] w-1 rounded-l bg-slate-700"></div>
        <div class="hardware-btn volume-down absolute top-[200px] left-2 z-10 h-[50px] w-1 rounded-l bg-slate-700"></div>
        <div class="hardware-btn power-btn absolute top-[170px] right-2 z-10 h-[65px] w-1 rounded-r bg-slate-700"></div>

        <div class="phone-container relative flex h-[844px] w-full max-w-[412px] flex-col overflow-hidden rounded-[44px] border-[12px] border-[#2d3540] bg-[#0D1117] shadow-[0_25px_50px_-12px_rgba(0,0,0,0.7),inset_0_0_4px_rgba(255,255,255,0.1)]">
            <div class="camera-island"></div>

            <div class="status-bar z-10 flex h-10 items-center justify-between px-6 pt-2 text-[13px] font-medium">
                <span class="status-time">15:00</span>
                <span class="status-icons">LTE 🔋 100%</span>
            </div>

            <main class="screen-content relative flex flex-1 flex-col overflow-y-auto p-5 [&::-webkit-scrollbar]:hidden">
                <section id="sec-bakery" class="app-section flex flex-1 flex-col">
                    <div class="flex flex-col gap-6 pb-5">
                        <article class="flex flex-col overflow-hidden rounded-[20px] border border-[#262626] bg-black">
                            <div class="flex items-center gap-2.5 px-3.5 py-3">
                                <div class="flex h-[30px] w-[30px] items-center justify-center rounded-full bg-[#262626] text-sm">🥐</div>
                                <span class="text-[13px] font-semibold">kihoon_</span>
                            </div>

                            <div class="post-slider-container relative w-full cursor-grab overflow-hidden active:cursor-grabbing">
                                <div class="post-slider-track flex transition-transform duration-200 ease-out">
                                    <div class="slide-item relative w-full shrink-0">
                                        <img class="aspect-square w-full bg-[#121212] object-cover pointer-events-none" src="../static/bakery1_1.jpg" alt="빵집1 사진1" draggable="false">
                                    </div>
                                    <div class="slide-item relative w-full shrink-0">
                                        <img class="aspect-square w-full bg-[#121212] object-cover pointer-events-none" src="../static/bakery1_2.jpg" alt="빵집1 사진2" draggable="false">
                                        <button class="easter-egg top-[15%] right-[15%]" data-id="item_coffee" type="button" aria-label="커피 조각 찾기">☕</button>
                                    </div>
                                    <div class="slide-item relative w-full shrink-0">
                                        <img class="aspect-square w-full bg-[#121212] object-cover pointer-events-none" src="../static/bakery1_3.jpg" alt="빵집1 사진3" draggable="false">
                                    </div>
                                    <div class="slide-item relative w-full shrink-0">
                                        <img class="aspect-square w-full bg-[#121212] object-cover pointer-events-none" src="../static/bakery1_4.jpg" alt="빵집1 사진4" draggable="false">
                                    </div>
                                </div>
                            </div>

                            <div class="px-3.5 pt-3 pb-1 text-lg tracking-[6px]">❤️ 💬 ✈️</div>
                            <div class="px-3.5 pt-1 pb-4">
                                <p class="text-[13px] leading-5 text-[#EFEFEF]"><strong class="mr-1.5 text-white">kihoon_</strong> 대전 사람들만의 작은 빵집이었던 성심당은 어느덧.. 더보기</p>
                            </div>
                        </article>

                        <article class="flex flex-col overflow-hidden rounded-[20px] border border-[#262626] bg-black">
                            <div class="flex items-center gap-2.5 px-3.5 py-3">
                                <div class="flex h-[30px] w-[30px] items-center justify-center rounded-full bg-[#262626] text-sm">🥐</div>
                                <span class="text-[13px] font-semibold">kihoon_</span>
                            </div>

                            <div class="post-slider-container relative w-full cursor-grab overflow-hidden active:cursor-grabbing">
                                <div class="post-slider-track flex transition-transform duration-200 ease-out">
                                    <div class="slide-item relative w-full shrink-0">
                                        <img class="aspect-square w-full bg-[#121212] object-cover pointer-events-none" src="../static/hobby_1.jpeg" alt="취미 사진1" draggable="false">
                                        <button class="easter-egg bottom-[20%] left-[15%]" data-id="item_dumbbell" type="button" aria-label="덤벨 조각 찾기">🏋️‍♂️</button>
                                    </div>
                                    <div class="slide-item relative w-full shrink-0">
                                        <img class="aspect-square w-full bg-[#121212] object-cover pointer-events-none" src="../static/hobby_2.jpeg" alt="취미 사진2" draggable="false">
                                    </div>
                                </div>
                            </div>

                            <div class="px-3.5 pt-3 pb-1 text-lg tracking-[6px]">❤️ 💬 ✈️</div>
                            <div class="px-3.5 pt-1 pb-4">
                                <p class="text-[13px] leading-5 text-[#EFEFEF]"><strong class="mr-1.5 text-white">kihoon_</strong> 의지로 멘탈관리가 되지 않을 때는 나가자</p>
                            </div>
                        </article>
                    </div>
                </section>
            </main>

            <div id="navigation-container" class="navigation-container"></div>
        </div>
    </div>

    <div id="gameModal" class="custom-modal">
        <div class="w-full max-w-[320px] rounded-[20px] border border-slate-700 bg-slate-800 p-6 text-center">
            <h2 class="mb-2.5 text-xl font-semibold text-emerald-500">🎉 클리어 성공!</h2>
            <p class="mb-5 text-[13px] leading-[1.6] text-slate-300">기훈(이)의 멘탈 관리 아이템을 모두 찾으셨군요!<br>이제 DM 창에 <strong>"오운완"</strong> 또는 <strong>"아메리카노"</strong>를 보내 히든 리액션을 확인해 보세요!</p>
            <button id="btnCloseModal" class="rounded-xl bg-blue-500 px-6 py-2.5 font-bold text-white transition hover:bg-blue-600 active:scale-95" type="button">확인</button>
        </div>
    </div>

    <script src="../js/common.js"></script>
    <script src="../js/recommendations.js"></script>
</body>
</html>
